constitution: /ARCHITECTURE.md
specs_root: /specs/
mode: code
modules:
  scaffolding:
    spec: /specs/modules/scaffolding/spec.md
    artifact_paths:
      - /pyproject.toml
      - /uv.lock
      - /Makefile
      - /.env.example
      - /src/person_finder/__init__.py
      - /src/person_finder/config.py
      - /tests/conftest.py
      - /tests/unit/__init__.py
      - /tests/unit/test_config.py
  users:
    spec: /specs/modules/users/spec.md
    artifact_paths:
      - /src/person_finder/users.py
      - /tests/unit/test_users.py
  agent:
    spec: /specs/modules/agent/spec.md
    artifact_paths:
      - /src/person_finder/agent.py
      - /tests/unit/test_agent.py
  validation:
    spec: /specs/modules/validation/spec.md
    artifact_paths:
      - /src/person_finder/validation.py
      - /tests/unit/test_validation.py
  eval:
    spec: /specs/modules/eval/spec.md
    artifact_paths:
      - /tests/eval/__init__.py
      - /tests/eval/conftest.py
      - /tests/eval/metrics.py
      - /tests/eval/stub_agents.py
      - /tests/eval/test_fixtures.py
      - /tests/eval/test_metric_failure_modes.py
      - /tests/eval/test_valid_json.py
      - /tests/eval/test_person_matches.py
      - /tests/eval/test_info_present.py
      - /specs/modules/eval/spec.md
